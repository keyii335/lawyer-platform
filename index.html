// ====== 通用DOCX生成器（适用于所有文书类型） ======
function buildGenericDocx(typeId) {
  var typeInfo = YS_TYPES.find(function(t) { return t.id === typeId; });
  if (!typeInfo) return null;
  var pfx = ysGetFormPrefix(typeId);
  var docTitle = typeInfo.type + '（' + typeInfo.name + '）';
  var rows = [];

  // 标题
  rows.push(ysDr([ysDc([ysDp([ysDv(docTitle, { bold: true, size: 28 })])], { span: 2 })]));
  // 说明
  rows.push(ysDr([ysDc([
    ysDp([ysDv('说明：为了方便您更好地参加诉讼，保护您的合法权利，请填写本表。', { size: 20 })]),
    ysDp([ysDv('1. 起诉时需向人民法院提交证明您身份的材料，如身份证复印件、营业执照复印件等。', { size: 20 })]),
    ysDp([ysDv('2. 本表所列内容是您提起诉讼以及人民法院查明案件事实所需，请务必如实填写。', { size: 20 })]),
  ], { span: 2 })]));

  // 当事人信息
  var multiPfx = ['mj','mm','fmj','fz','jj','ld','lh','js','jd','bz','cs'];
  if (multiPfx.indexOf(pfx) >= 0) {
    try {
      var parties = ysCollectParties(pfx);
      if (parties.length) {
        rows.push(ysHeaderRow('当事人信息'));
        parties.forEach(function(p) {
          if (p.partyType === '法人') { rows = rows.concat(ysDocxLegalRows(p, p.role)); }
          else { rows = rows.concat(ysDocxNatureRows(p, p.role)); }
          if (p.agent) rows = rows.concat(ysDocxAgentRow(p));
        });
      }
    } catch(e) {}
  } else {
    // 申请书/答辩状等自定义当事人字段
    var customMap = {
      'zx': [['申请人姓名/名称','zx_pname'],['申请人电话','zx_pphone'],['申请人地址','zx_paddr'],['被执行人姓名/名称','zx_dname'],['被执行人电话','zx_dphone'],['被执行人地址','zx_daddr']],
      'yj': [['申请人姓名/名称','yj_pname'],['申请人电话','yj_pphone'],['申请人地址','yj_paddr']],
      'fy': [['申请人姓名/名称','fy_pname'],['申请人电话','fy_pphone'],['申请人地址','fy_paddr']],
      'cyfp': [['申请人姓名/名称','cy_pname'],['申请人电话','cy_pphone'],['申请人地址','cy_paddr']],
      'bzh': [['答辩人名称','bzd_name'],['答辩人电话','bzd_phone'],['答辩人地址','bzd_addr']]
    };
    if (customMap[pfx]) {
      rows.push(ysHeaderRow('当事人信息'));
      customMap[pfx].forEach(function(item) {
        rows.push(ysLabelValueRow(item[0], ysGetV(item[1]) || '——'));
      });
    }
  }

  // 扫描表单区域生成剩余字段
  var formEl = document.getElementById('ysForm_' + typeId);
  if (formEl) {
    var sections = formEl.querySelectorAll('.ys-form-section');
    sections.forEach(function(sec) {
      var titleEl = sec.querySelector('.ys-section-title');
      if (!titleEl) return;
      var stitle = titleEl.textContent.trim();
      if (stitle === '当事人信息') return;
      rows.push(ysHeaderRow(stitle));
      var fields = sec.querySelectorAll('input, textarea, select');
      fields.forEach(function(field) {
        if (field.type === 'radio' || field.type === 'checkbox') return;
        // 跳过隐藏字段
        var el = field; var hidden = false;
        while (el && el !== sec) { if (el.style && el.style.display === 'none') { hidden = true; break; } el = el.parentElement; }
        if (hidden) return;
        var label = '';
        var p = field.parentElement;
        if (p) { var le = p.querySelector('label'); if (le) label = le.textContent.trim().replace(/[*\s]+$/, ''); }
        var value = field.value || '——';
        if (label) rows.push(ysLabelValueRow(label, value));
      });
    });
  }

  // 签名区
  rows.push(ysEmptyRow(2));
  rows.push(ysDr([ysDc([
    ysDp([ysDv('具状人（签字、盖章）：', { size: 21 })]),
    ysDp([ysDv('日期：　　　　年　　　　月　　　　日', { size: 21 })]),
  ], { span: 2 })]));
  return rows;
}

// 通用docx下载入口
function ysDownloadDocx(typeId) {
  if (typeof docx === 'undefined') { alert('docx.js库加载中，请稍后再试'); return; }
  var typeInfo = YS_TYPES.find(function(t) { return t.id === typeId; });
  var typeName = typeInfo ? (typeInfo.type + '（' + typeInfo.name + '）') : '要素式诉状';
  var tableRows = null;
  switch(typeId) {
    case 'jidong': tableRows = buildJidongDocx(); typeName = '机动车交通事故责任纠纷起诉状'; break;
    case 'minjie': tableRows = buildMinjieDocx(); typeName = '民间借贷纠纷起诉状'; break;
    default: tableRows = buildGenericDocx(typeId); break;
  }
  if (!tableRows) return;

  var doc = new docx.Document({
    sections: [{
      properties: {
        page: {
          size: { width: 11906, height: 16838, orientation: docx.PageOrientation.PORTRAIT },
          margin: { top: 570, right: 1417, bottom: 998, left: 1133 }
        }
      },
      children: [
        new docx.Paragraph({ alignment: docx.AlignmentType.CENTER, spacing: { after: 200 }, children: [new docx.TextRun({ text: typeName.replace('起诉状','') + '民事起诉状', bold: true, size: 36, font: '黑体' })] }),
        ysDt(tableRows),
        new docx.Paragraph({ children: [new docx.TextRun({ text: ' ', size: 10 })] })
      ]
    }]
  });

  docx.Packer.toBlob(doc).then(function(blob) {
    if (typeof saveAs === 'function') {
      saveAs(blob, typeName + '.docx');
    } else {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = typeName + '.docx'; a.click();
      URL.revokeObjectURL(url);
    }
  });
}

var ysState = { selectedType: null, step: 1, parseTab: 'text', parseResult: null };

function renderYaosushi() {
  var html = '<div class="yaosushi-container">';

  // ===== 智能解析对话框 =====
  html += '<div class="ys-parse-dialog" id="ysParseDialog">';
  html += '<div class="ys-parse-dialog-title">🤖 智能解析传统诉状<span class="ys-parse-badge identified">NEW</span></div>';
  html += '<div class="ys-parse-dialog-desc">粘贴或上传传统格式起诉状，自动识别当事人、案由、诉讼请求、借款金额、日期等关键要素，一键填充到下方表单——就像快递小程序识别收件人一样。</div>';
  html += '<div class="ys-parse-tabs">';
  html += '<div class="ys-parse-tab' + (ysState.parseTab !== 'upload' ? ' active' : '') + '" onclick="ysSetParseTab(\'text\')">📝 粘贴文字</div>';
  html += '<div class="ys-parse-tab' + (ysState.parseTab === 'upload' ? ' active' : '') + '" onclick="ysSetParseTab(\'upload\')">📎 上传文件</div>';
  html += '</div>';
  if (ysState.parseTab === 'upload') {
    html += '<div class="ys-parse-upload-area" onclick="document.getElementById(\'ysFileInput\').click()">';
    html += '<div class="ys-parse-upload-icon">📄</div>';
    html += '<div class="ys-parse-upload-text">点击选择或拖拽文件到此处</div>';
    html += '<div class="ys-parse-upload-hint">支持 .pdf .docx .txt 文件，自动提取文字后智能识别</div>';
    html += '</div>';
    html += '<input type="file" id="ysFileInput" accept=".pdf,.docx,.doc,.txt,.text" style="display:none" onchange="ysHandleFileUpload(this)">';
  } else {
    html += '<textarea class="ys-parse-textarea" id="ysParseInput" placeholder="请将传统格式的起诉状原文粘贴至此处...\n\n例如：\n民事起诉状\n原告：张三，男，汉族，1980年1月1日出生，现住...\n被告：李四，男，汉族，现住...\n诉讼请求：\n一、判令被告偿还借款本金100000元...\n事实与理由：\n2022年3月1日，被告向原告借款..."></textarea>';
  }
  html += '<div class="ys-parse-actions">';
  html += '<button class="btn btn-primary" onclick="ysStartParse()" style="background:var(--primary);color:#fff;padding:9px 24px;font-size:14px;">🔍 立即识别</button>';
  html += '<button class="btn btn-outline" onclick="ysParseInput && (document.getElementById(\'ysParseInput\') ? document.getElementById(\'ysParseInput\').value=\'\' : 0); ysState.parseResult=null; renderYaosushi();" style="font-size:13px;">清空</button>';
  html += '<span style="font-size:12px;color:var(--text-secondary);margin-left:auto;">识别后自动跳转对应类型表单并填入数据</span>';
  html += '</div>';
  // 识别结果展示
  if (ysState.parseResult) {
    var pr = ysState.parseResult;
    html += '<div class="ys-parse-result">';
    html += '<div class="ys-parse-result-title">✅ 识别结果 <span class="ys-parse-badge identified">已识别 ' + pr._identified + ' 项</span>';
    if (pr._typeLabel) html += '<span class="ys-parse-badge partial" style="margin-left:4px;">案由：' + pr._typeLabel + '</span>';
    html += '</div>';
    var showFields = [
      ['案由类型', pr._typeLabel], ['原告姓名', pr.p_name], ['原告类型', pr.p_orgType], ['原告地址', pr.p_addr], ['原告电话', pr.p_phone],
      ['被告姓名', pr.d_name], ['被告类型', pr.d_orgType], ['被告地址', pr.d_addr], ['被告电话', pr.d_phone],
      ['借款金额', pr.amount ? pr.amount + ' 元' : null], ['借款期限', pr.period],
      ['约定利率', pr.rate ? pr.rate + '%/年' : null], ['出借方式', pr.payway],
      ['合同签订日期', pr.ct_date], ['诉讼请求', pr.claims], ['事实与理由', pr.facts ? '已识别（' + pr.facts.length + '字）' : null]
    ];
    showFields.forEach(function(f) {
      if (f[1]) {
        html += '<div class="ys-parse-item"><span class="ys-parse-item-label">' + f[0] + '</span>';
        html += '<span class="ys-parse-item-value' + (f[0]==='案由类型'||f[0]==='借款金额' ? ' highlight' : '') + '">' + esc(f[1]) + '</span></div>';
      }
    });
    html += '<button class="ys-parse-fill-btn" onclick="ysFillFormFromParse()">⚡ 一键填入表单</button>';
    html += '</div>';
  }
  html += '</div>';

  // ===== 文书类型选择 =====
  html += '<div class="card" style="margin-bottom:20px;">';
  html += '<div class="card-header"><div class="card-title">📄 要素式诉状生成器</div>';
  html += '<div style="font-size:13px;color:var(--text-secondary);">支持16种官方要素式诉状/申请书模板</div></div>';
  html += '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">选择文书类型，按要素填写后自动生成规范文书。也可先用上方智能识别自动填充。</div>';
  html += '<div class="ys-type-grid">';
  YS_TYPES.forEach(function(t) {

    html += '<div class="ys-type-card' + sel + '" onclick="ysSelectType(\'' + t.id + '\')">';

    html += '<div style="font-size:11px;color:var(--text-secondary);margin-top:3px;">' + t.type + '</div>';
    html += '</div>';
  });
  html += '</div></div>';

  if (ysState.selectedType) {
    html += '<div id="ysFormArea">' + renderYsForm(ysState.selectedType) + '</div>';
  }
  html += '</div>';

  document.getElementById('contentArea').innerHTML = html;
}

function ysSelectType(typeId) {
  ysState.selectedType = typeId;
  renderYaosushi();
  setTimeout(function() {
    var el = document.getElementById('ysFormArea');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function renderYsForm(typeId) {
  switch(typeId) {

    case 'fangmaijie': return renderYsFormFangmaijie();

    case 'laodong': return renderYsFormLaodong();
    case 'lihun': return renderYsFormLihun();
    case 'jianshe': return renderYsFormJianshe();
    case 'jidong': return renderYsFormJidong();
    case 'buzh': return renderYsFormBuzh();
    case 'caisun': return renderYsFormCaisun();
    case 'baozheng': return renderYsFormBaozheng();

// 切换当事人类型（自然人/法人）
function ysTogglePartyType(idBase, type) {
  var natureEl = document.getElementById(idBase + '_nature');

  if (natureEl && legalEl) {
    natureEl.style.display = type === '自然人' ? '' : 'none';
    legalEl.style.display = type === '法人' ? '' : 'none';
  }
}

function ysToggleLegalRep(idBase, show) {
  var el = document.getElementById(idBase + '_lr_section');
  if (el) el.style.display = show ? '' : 'none';
  var partyArr = idBase.indexOf('_p') > -1 ? ysMultiParty.plaintiffs : (idBase.indexOf('_d') > -1 ? ysMultiParty.defendants : ysMultiParty.thirdParties);
  var idx = parseInt(idBase.match(/(\d+)$/)[1]);
  if (partyArr[idx]) partyArr[idx].hasLegalRep = show;
}

function ysAddParty(prefix, role) {
  var areaId = prefix + '_' + role + 's_area';
  var arr = role === 'plaintiff' ? ysMultiParty.plaintiffs : (role === 'defendant' ? ysMultiParty.defendants : ysMultiParty.thirdParties);
  var newIdx = arr.length;
  var roleChar = role === 'plaintiff' ? 'p' : (role === 'defendant' ? 'd' : 't');
  var roleLabel = role === 'plaintiff' ? '原告' : (role === 'defendant' ? '被告' : '第三人');
  arr.push({ idx: newIdx, type: '自然人', hasLegalRep: false });

  var area = document.getElementById(areaId);
  if (!area) return;
  var div = document.createElement('div');
  div.id = prefix + '_' + roleChar + newIdx + '_block';
  div.innerHTML = ysSinglePartyBlock(prefix, roleChar, newIdx, roleLabel).replace(/^<div[^>]*>|<\/div>$/g, '');
  div.style.cssText = 'background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;padding:12px;margin-bottom:8px;position:relative;';
  area.appendChild(div);
}

function ysRemoveParty(prefix, role, idx) {
  var roleChar = role === 'plaintiff' ? 'p' : (role === 'defendant' ? 'd' : 't');
  var block = document.getElementById(prefix + '_' + roleChar + idx + '_block');
  if (block) block.remove();
  if (role === 'plaintiff') ysMultiParty.plaintiffs.splice(idx, 1);
  else if (role === 'defendant') ysMultiParty.defendants.splice(idx, 1);
  else ysMultiParty.thirdParties.splice(idx, 1);
}

function ysGetV(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function ysGetChecked(name) {
  var els = document.querySelectorAll('input[name="' + name + '"]:checked');
  var vals = [];
  els.forEach(function(e) { vals.push(e.value); });
  return vals.join('；');
}

// ==== GENERATE DOCUMENT ====
function ysGenerate(typeId) {
  var previewId = 'ysPreview_' + typeId;
  var html = '';
  try {
    html = ysGenDoc(typeId);
  } catch(e) {
    html = '<div style="color:red;padding:10px;">生成出错：' + e.message + '</div>';
  }
  document.getElementById(previewId).innerHTML = html;
  setTimeout(function() {
    var el = document.getElementById(previewId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function ysDocHeader(title, cause, note) {
  var d = new Date();
  var dateStr = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  return '<div class="ys-preview">' +
    '<div style="text-align:right;font-size:12px;color:#888;margin-bottom:10px;">生成日期：' + dateStr + '</div>' +
    '<h2>' + title + '</h2>' +
    (cause ? '<div class="ys-cause">（' + cause + '）</div>' : '') +
    (note ? '<div style="font-size:12px;color:#888;text-align:center;margin-bottom:16px;">' + note + '</div>' : '');
}

function ysDocTable(rows) {
  var html = '<table class="ys-preview-table">';
  rows.forEach(function(r) {
    if (r.length === 1) {
      html += '<tr><td colspan="2" style="background:#f0eee4;font-weight:700;padding:9px 12px;font-size:14px;">' + r[0] + '</td></tr>';
    } else {
      html += '<tr><td>' + r[0] + '</td><td>' + (r[1] || '') + '</td></tr>';
    }
  });
  html += '</table>';
  return html;
}

function ysCopyBtn(typeId) {
  return '<div style="text-align:center;margin-top:20px;display:flex;gap:12px;justify-content:center;">' +
    '<button class="btn btn-outline" onclick="ysCopyText(\'' + typeId + '\')">📋 复制文本</button>' +
    '<button class="btn btn-primary" onclick="ysPrint(\'' + typeId + '\')">🖨️ 打印</button>' +
    '</div>';
}

function ysGenDoc(typeId) {
  switch(typeId) {
    case 'minjie': return ysGenMinjie();
    case 'maimai': return ysGenMaimai();
    case 'fangmaijie': return ysGenFangmaijie();
    case 'fangzu': return ysGenFangzu();
    case 'jinjie': return ysGenJinjie();
    case 'laodong': return ysGenLaodong();
    case 'lihun': return ysGenLihun();
    case 'jianshe': return ysGenJianshe();
    case 'jidong': return ysGenJidong();
    case 'buzh': return ysGenBuzh();
    case 'caisun': return ysGenCaisun();
    case 'baozheng': return ysGenBaozheng();
    case 'zhixing': return ysGenZhixing();
    case 'yijian': return ysGenYijian();
    case 'fuyi': return ysGenFuyi();
    case 'canyufenpei': return ysGenCanyufenpei();
    default: return '';
  }
}

function ysGenMinjie() {
  var p = ysGetV('mj_p0_name'), d = ysGetV('mj_d0_name');
  var pOrg = ysGetV('mj_p0_org_name'), dOrg = ysGetV('mj_d0_org_name');
  if (!p && !pOrg) { alert('请填写原告信息！'); return ''; }
  if (!d && !dOrg) { alert('请填写被告信息！'); return ''; }
  var principal = ysGetV('mj_principal'), interest = ysGetV('mj_interest');
  var calcdate = ysGetV('mj_calcdate'), toend = ysGetV('mj_toend');
  var othercost = ysGetV('mj_othercost');
  var ctname = ysGetV('mj_ctname'), ctplace = ysGetV('mj_ctplace');
  var amount = ysGetV('mj_amount'), actual = ysGetV('mj_actual');
  var payway = ysGetV('mj_payway'), period = ysGetV('mj_period'), rate = ysGetV('mj_rate');
  var expired = ysGetV('mj_expired'), repaidp = ysGetV('mj_repaid_p'), repaidi = ysGetV('mj_repaid_i');
  var guarantee = ysGetV('mj_guarantee'), other = ysGetV('mj_other'), basis = ysGetV('mj_basis');
  var pgender = ysGetV('mj_p0_gender'), pphone = ysGetV('mj_p0_phone'), paddr = ysGetV('mj_p0_addr');

function ysCopyText(typeId) {
  var el = document.getElementById('ysPreview_' + typeId);
  if (!el) return;
  // Extract plain text
  var tmp = document.createElement('div');
  tmp.innerHTML = el.querySelector('.ys-preview') ? el.querySelector('.ys-preview').innerHTML : el.innerHTML;
  // Convert table to text
  var tables = tmp.querySelectorAll('table');
  tables.forEach(function(t) {
    var rows = t.querySelectorAll('tr');
    var lines = [];
    rows.forEach(function(r) {
      var cells = r.querySelectorAll('td');
      if (cells.length === 1) {
        lines.push('\n【' + cells[0].textContent.trim() + '】');
      } else if (cells.length === 2) {
        lines.push(cells[0].textContent.trim() + '：' + cells[1].textContent.trim());
      }
    });
    var p = document.createElement('pre');
    p.textContent = lines.join('\n');
    t.parentNode.replaceChild(p, t);
  });
  var text = tmp.textContent || tmp.innerText || '';
  navigator.clipboard.writeText(text).then(function() {
    toast('文书内容已复制到剪贴板', 'success');
  }).catch(function() {
    // fallback
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('文书内容已复制', 'success');
  });
}

// ============ 智能解析传统诉状 ============

// 切换输入标签（粘贴/上传）
function ysSetParseTab(tab) {
  ysState.parseTab = tab;
  ysState.parseResult = null;
  renderYaosushi();
}

// 处理文件上传（支持PDF、DOCX、TXT）
function ysHandleFileUpload(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var ext = (file.name || '').split('.').pop().toLowerCase();
  toast('正在读取文件: ' + file.name + ' ...', 'info');

  if (ext === 'txt' || ext === 'text') {
    // 纯文本文件，直接读取
    var reader = new FileReader();
    reader.onload = function(e) {
      ysShowExtractedText(e.target.result || '', file.name);
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'docx' || ext === 'doc') {
    // DOCX文件，使用mammoth.js解析
    if (typeof mammoth === 'undefined') {
      toast('DOCX解析库未加载，请稍后重试或使用纯文本格式', 'warning');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var arrayBuffer = e.target.result;
      mammoth.extractRawText({ arrayBuffer: arrayBuffer }).then(function(result) {
        ysShowExtractedText(result.value || '', file.name);
      }).catch(function(err) {
        toast('DOCX解析失败: ' + err.message, 'error');
      });
    };
    reader.readAsArrayBuffer(file);
  } else if (ext === 'pdf') {
    // PDF文件，使用pdf.js解析
    if (typeof pdfjsLib === 'undefined') {
      toast('PDF解析库未加载，请稍后重试或使用纯文本格式', 'warning');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var typedArray = new Uint8Array(e.target.result);
      pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
        var totalPages = pdf.numPages;
        var allText = '';
        var loaded = 0;
        function loadPage(pageNum) {
          pdf.getPage(pageNum).then(function(page) {
            page.getTextContent().then(function(content) {
              var pageText = content.items.map(function(item) { return item.str; }).join(' ');
              allText += pageText + '\n';
              loaded++;
              if (loaded < totalPages) {
                loadPage(loaded + 1);
              } else {
                ysShowExtractedText(allText, file.name + '（共' + totalPages + '页）');
              }
            });
          });
        }
        loadPage(1);
      }).catch(function(err) {
        toast('PDF解析失败: ' + err.message, 'error');
      });
    };
    reader.readAsArrayBuffer(file);
  } else {
    toast('不支持的文件格式，请上传 .pdf、.docx 或 .txt 文件', 'warning');
  }
}

// 将提取的文本显示并准备解析
function ysShowExtractedText(text, source) {
  if (!text || !text.trim()) {
    toast('未能从文件中提取到文字内容', 'warning');
    return;
  }
  ysState.parseTab = 'text';
  renderYaosushi();
  setTimeout(function() {
    var ta = document.getElementById('ysParseInput');
    if (ta) {
      ta.value = text.trim();
    }
    toast('✅ 文件读取成功（' + source + '），共 ' + text.trim().length + ' 字。点击「立即识别」开始解析', 'success');
  }, 100);
}

// 启动解析
function ysStartParse() {
  var ta = document.getElementById('ysParseInput');
  var text = ta ? ta.value.trim() : '';
  if (!text) { toast('请先输入或粘贴诉状内容', 'warning'); return; }
  var result = ysParseText(text);
  ysState.parseResult = result;
  if (result._identified === 0) {
    toast('未能识别到有效内容，请确认文本格式是否为起诉状', 'warning');
  } else {
    toast('成功识别 ' + result._identified + ' 项要素！', 'success');
  }
  renderYaosushi();
  // 滚动到识别结果
  setTimeout(function() {
    var el = document.querySelector('.ys-parse-result');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ===== 核心解析函数 =====
function ysParseText(text) {
  var r = { _identified: 0, _typeId: null, _typeLabel: null };

  // 预处理：PDF/DOCX提取的文本可能有大量空白和不规则格式
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  // 合并连续空格（保留换行）
  var lines = text.split('\n').map(function(l) { return l.replace(/[ \t]{2,}/g, ' ').trim(); }).filter(function(l) { return l.length > 0; });
  text = lines.join('\n');

  // ===== 1. 识别案由 =====
  var typeInfo = ysDetectCause(text);
  r._typeId = typeInfo.id;
  r._typeLabel = typeInfo.label;
  if (typeInfo.id) r._identified++;

  // ===== 2. 提取原告信息 =====
  var ptf = ysExtractParty(text, ['原告', '申请人', '上诉人', '出借方', '出借人', '卖方', '买方', '债权人', '受害方', '承包方', '劳动者']);
  if (ptf.name) { r.p_name = ptf.name; r._identified++; }
  if (ptf.gender) r.p_gender = ptf.gender;
  if (ptf.phone) { r.p_phone = ptf.phone; r._identified++; }
  if (ptf.idno) r.p_idno = ptf.idno;
  if (ptf.addr) { r.p_addr = ptf.addr; r._identified++; }
  if (ptf.birth) r.p_birth = ptf.birth;
  if (ptf.ethnic) r.p_ethnic = ptf.ethnic;
  if (ptf.workunit) r.p_workunit = ptf.workunit;
  if (ptf.orgType) r.p_orgType = ptf.orgType;

  // ===== 3. 提取被告信息 =====
  var def = ysExtractParty(text, ['被告', '被申请人', '被上诉人', '借款方', '借款人', '出卖方', '用人单位', '保险人', '发包方', '肇事方']);
  if (def.name) { r.d_name = def.name; r._identified++; }
  if (def.gender) r.d_gender = def.gender;
  if (def.phone) { r.d_phone = def.phone; r._identified++; }
  if (def.idno) r.d_idno = def.idno;
  if (def.addr) { r.d_addr = def.addr; r._identified++; }
  if (def.birth) r.d_birth = def.birth;
  if (def.orgType) r.d_orgType = def.orgType;

  // ===== 4. 提取借款金额 =====
  var amountPatterns = [
    /借款[金额本金]*[为是：:\s]*[人民币￥¥]?\s*([0-9,，]+(?:\.[0-9]+)?)\s*元/,
    /[金额本金][为是：:\s]*[人民币￥¥]?\s*([0-9,，]+(?:\.[0-9]+)?)\s*元/,
    /([0-9,，]+(?:\.[0-9]+)?)\s*元[整正]?\s*(?:人民币|RMB)?[^。\n]*?(?:借|款|贷)/,
    /尚欠本金[人民币￥¥]?\s*([0-9,，]+(?:\.[0-9]+)?)\s*元/,
    /本金[^0-9]*([0-9,，]+(?:\.[0-9]+)?)\s*元/,
    /欠款[^0-9]*([0-9,，]+(?:\.[0-9]+)?)\s*元/,
    /标的[金额]*[^0-9]*([0-9,，]+(?:\.[0-9]+)?)\s*元/
  ];
  for (var i = 0; i < amountPatterns.length; i++) {
    var amountMatch = text.match(amountPatterns[i]);
    if (amountMatch) {
      r.amount = amountMatch[1].replace(/,|，/g, '');
      r._identified++;
      break;
    }
  }

  // ===== 5. 提取利率 =====
  var ratePatterns = [
    /(?:年利率|利率)[为是：:\s]*([0-9]+(?:\.[0-9]+)?)\s*%/,
    /([0-9]+(?:\.[0-9]+)?)\s*%\s*(?:的)?(?:年利率|月利率|利率)/,
    /月息[为是：:\s]*([0-9]+(?:\.[0-9]+)?)\s*%/, // 月息转年利率
    /利率[（(][^）)]*?([0-9]+(?:\.[0-9]+)?)\s*%/,
    /年利率[（(]\s*[第\s]*[一二三四五六七八九十\d]+\s*条[）)][为是：:\s]*([0-9]+(?:\.[0-9]+)?)\s*%/
  ];
  for (var i = 0; i < ratePatterns.length; i++) {
    var rateMatch = text.match(ratePatterns[i]);
    if (rateMatch) { r.rate = rateMatch[1]; r._identified++; break; }
  }

  // ===== 6. 提取借款期限 =====
  var periodPatterns = [
    /(?:借款期限|还款期限|借款期间|还款日期)[为是：:\s]*([\d零一二三四五六七八九十百]+年[\d零一二三四五六七八九十]+月[\d零一二三四五六七八九十]+日[至到—\-][\d零一二三四五六七八九十百]+年[\d零一二三四五六七八九十]+月[\d零一二三四五六七八九十]+日)/,
    /自?(2\d{3}年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日)[至到—\-](2\d{3}年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日)/,
    /(?:2\d{3})年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日[至到—\-](?:2\d{3})年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日/,
    /借[期款][^。]*?(\d{4}年\d{1,2}月\d{1,2}日)[^。]*?至[^。]*?(\d{4}年\d{1,2}月\d{1,2}日)/
  ];
  for (var i = 0; i < periodPatterns.length; i++) {
    var periodMatch = text.match(periodPatterns[i]);
    if (periodMatch) {
      r.period = periodMatch[1] + (periodMatch[2] ? '至' + periodMatch[2] : '');
      r._identified++;
      break;
    }
  }

  // ===== 7. 提取出借方式 =====
  if (/转账|汇款|银行/.test(text)) r.payway = '转账';
  else if (/现金/.test(text)) r.payway = '现金';

  // ===== 8. 提取诉讼请求 =====
  var claimsPatterns = [
    /(?:诉讼请求|请求事项|诉请)[：:\s\n]+([\s\S]{20,600}?)(?=事实与理由|事实理由|法律依据|此致|附|一、[^、])/,
    /(?:诉讼请求|请求事项)[：:\s\n]+([\s\S]{20,600}?)(?=\n\s*\n|事实|理由|此致)/
  ];
  for (var i = 0; i < claimsPatterns.length; i++) {
    var claimsMatch = text.match(claimsPatterns[i]);
    if (claimsMatch) {
      r.claims = claimsMatch[1].trim().slice(0, 500);
      r._identified++;
      break;
    }
  }

  // ===== 9. 提取事实与理由 =====
  var factMatch = text.match(/(?:事实与理由|事实理由|事实)[：:\s\n]+([\s\S]{30,1500}?)(?=此致|此\s*致|具状人|起诉人|申请人|附[:：])/);
  if (factMatch) {
    r.facts = factMatch[1].trim().slice(0, 1000);
    r._identified++;
  }

  // ===== 10. 提取代理律师 =====
  var agentMatch = text.match(/委托(?:诉讼)?代理人[：:\s]*([^\s，,。\n]{2,15})/);
  if (agentMatch) r.p_agent = agentMatch[1];

  // ===== 11. 提取合同签订信息 =====
  var ctMatch = text.match(/(?:签订|订立)[^。]{0,20}?(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (ctMatch) {
    r.ct_date = ctMatch[1] + '年' + ctMatch[2] + '月' + ctMatch[3] + '日';
    r._identified++;
  }

  // ===== 12. 提取证据清单 =====
  var evidenceMatch = text.match(/(?:证据|证据清单)[：:\s\n]+([\s\S]{20,500}?)(?=\n\s*\n|此致|具状人|附)/);
  if (evidenceMatch) {
    r.evidence = evidenceMatch[1].trim().slice(0, 500);
    r._identified++;
  }

  return r;
}

// 识别案由
function ysDetectCause(text) {
  var causeMap = [
    { id: 'minjie', label: '民间借贷纠纷', keywords: ['民间借贷', '借款合同', '借款纠纷', '民间借贷纠纷', '借款本金', '出借', '借款人', '出借方'] },
    { id: 'maimai', label: '买卖合同纠纷', keywords: ['买卖合同', '购销合同', '货款', '买卖', '产品质量', '售价', '卖方', '买方'] },
    { id: 'fangmaijie', label: '房屋买卖合同纠纷', keywords: ['房屋买卖', '商品房', '购房', '房屋转让', '不动产', '房产'] },
    { id: 'fangzu', label: '房屋租赁合同纠纷', keywords: ['房屋租赁', '租房', '租金', '承租', '房租', '租赁合同'] },
    { id: 'jinjie', label: '金融借款合同纠纷', keywords: ['金融借款', '银行贷款', '信用贷款', '商业贷款', '按揭贷款'] },
    { id: 'laodong', label: '劳动合同纠纷', keywords: ['劳动合同', '工资', '劳动报酬', '解除劳动', '劳动争议', '用人单位'] },
    { id: 'lihun', label: '离婚纠纷', keywords: ['离婚', '夫妻', '婚姻', '子女抚养', '共同财产', '分割'] },
    { id: 'jianshe', label: '建设工程合同纠纷', keywords: ['建设工程', '施工合同', '工程款', '承包', '发包', '建筑工程'] },
    { id: 'jidong', label: '机动车交通事故责任纠纷', keywords: ['交通事故', '车辆', '机动车', '驾驶', '撞车', '交强险'] },
    { id: 'caisun', label: '财产损害赔偿纠纷', keywords: ['财产损害', '赔偿', '损失', '侵权'] },
    { id: 'lihun', label: '离婚纠纷', keywords: ['离婚'] }
  ];
  var scores = {};
  causeMap.forEach(function(c) {
    scores[c.id] = 0;
    c.keywords.forEach(function(kw) { if (text.indexOf(kw) >= 0) scores[c.id] += 1; });
  });
  var best = null; var bestScore = 0;
  causeMap.forEach(function(c) {
    if (scores[c.id] > bestScore) { bestScore = scores[c.id]; best = c; }
  });
  return best && bestScore > 0 ? { id: best.id, label: best.label } : { id: null, label: null };
}

// 提取当事人信息（通用，增强版）
function ysExtractParty(text, labels) {
  var info = {};
  // 多种格式匹配：原告：xxx / 原告xxx / 原告  xxx
  var labelReg = new RegExp('(?:' + labels.join('|') + ')[\\s：:、]*([^\\n]{2,100})');
  var m = text.match(labelReg);
  if (!m) {
    // 尝试跨行匹配
    var labelIdx = -1;
    for (var i = 0; i < labels.length; i++) {
      var idx = text.indexOf(labels[i]);
      if (idx >= 0 && (labelIdx < 0 || idx < labelIdx)) {
        labelIdx = idx;
      }
    }
    if (labelIdx >= 0) {
      var afterLabel = text.slice(labelIdx).replace(/^.*?(原告|被告|申请人|被申请人|上诉人|被上诉人|出借方|出借人|借款方|借款人|卖方|买方|出卖方|承包方|发包方|劳动者|用人单位|保险人|被保险人|受害方|肇事方|债权人)[\s：:、]*/,'').trim();
      m = afterLabel.length > 1 ? [afterLabel, afterLabel] : null;
    }
  }
  if (!m) return info;
  var line = m[1] || m[0];

  // 判断是自然人还是法人
  var orgKeywords = ['公司','企业','有限','股份','集团','银行','工厂','医院','学校','机构','事务所','合作社','协会'];
  var isOrg = false;
  for (var k = 0; k < orgKeywords.length; k++) {
    if (line.indexOf(orgKeywords[k]) >= 0) { isOrg = true; break; }
  }
  info.orgType = isOrg ? '法人' : '自然人';

  if (isOrg) {
    // 法人：提取组织名称
    var orgNameM = line.match(/^([^\s，,。;；()（）]{4,60}(?:公司|企业|厂|院|校|馆|所|中心|机构|事务所|协会|合作社|银行|集团))/);
    if (!orgNameM) orgNameM = line.match(/^([^\s，,。;；]{2,60})/);
    if (orgNameM) info.name = orgNameM[1].trim();
  } else {
    // 自然人：提取姓名
    var nameM = line.match(/^([^\s，,男女0-9]{2,10})/);
    if (nameM) info.name = nameM[1].replace(/[，,。\s]$/, '');
  }

  // 性别
  if (/男/.test(line.slice(0,30))) info.gender = '男';
  else if (/女/.test(line.slice(0,30))) info.gender = '女';

  // 出生日期（多种格式）
  var birthM = line.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (!birthM) birthM = line.match(/(\d{4})[^\d]{1,2}(\d{1,2})[^\d]{1,2}(\d{1,2})/);
  if (birthM) info.birth = birthM[1] + '年' + birthM[2] + '月' + birthM[3] + '日';

  // 民族
  var ethnicM = line.match(/(汉族|回族|藏族|维吾尔族|苗族|彝族|壮族|布依族|朝鲜族|满族|侗族|瑶族|白族|土家族|哈尼族|哈萨克族|傣族|黎族|傈僳族|佤族|畲族|高山族|拉祜族|水族|东乡族|纳西族|景颇族|柯尔克孜族|土族|达斡尔族|仫佬族|羌族|布朗族|撒拉族|毛南族|仡佬族|锡伯族|阿昌族|普米族|塔吉克族|怒族|乌孜别克族|俄罗斯族|鄂温克族|德昂族|保安族|裕固族|京族|塔塔尔族|独龙族|鄂伦春族|赫哲族|门巴族|珞巴族|基诺族)/);
  if (ethnicM) info.ethnic = ethnicM[1];

  // 工作单位
  var workM = line.match(/(?:工作单位|单位)[：:\s]*([^\s，,。;；]{2,40})/);
  if (workM) info.workunit = workM[1];

  // 电话（11位手机号，搜索范围扩大）
  var searchStart = Math.max(0, text.indexOf(m[0]) - 100);
  var searchEnd = Math.min(text.length, text.indexOf(m[0]) + 400);
  var phoneM = text.slice(searchStart, searchEnd).match(/1[3-9]\d{9}/);
  if (phoneM) info.phone = phoneM[0];

  // 身份证号（18位）
  var idM = line.match(/([1-9]\d{5}(?:18|19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dX])/i);
  if (!idM) {
    var context = text.slice(text.indexOf(m[0]), Math.min(text.length, text.indexOf(m[0]) + 400));
    idM = context.match(/([1-9]\d{5}(?:18|19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dX])/i);
  }
  if (idM) info.idno = idM[1];

  // 地址（多种模式匹配）
  var addrPatterns = [
    /(?:住所地|住址|住所|居住地|经常居住地|地址|通讯地址|户籍)[（(][^）)]+[）)][：:\s]*([^\n，,。]{6,80})/,
    /(?:住所地|住址|住所|居住地|经常居住地|地址|通讯地址|现住|户籍)[：:\s]*([^\n，,。]{6,80})/,
    /(?:住|居住于)[：:\s]*([^\n，,。]{5,60})/,
    /([^\s，,]{2,5}(?:省|市|区|县|镇|乡|街|路|道|号|村|组|栋|楼|室|单元)[^\s，,。]{2,60})/
  ];
  for (var a = 0; a < addrPatterns.length; a++) {
    var addrM = line.match(addrPatterns[a]);
    if (!addrM) addrM = text.slice(text.indexOf(m[0]), Math.min(text.length, text.indexOf(m[0]) + 400)).match(addrPatterns[a]);
    if (addrM) { info.addr = (addrM[1] || '').trim(); break; }
  }

  return info;
}

// ===== 一键填入表单 =====
function ysFillFormFromParse() {
  var pr = ysState.parseResult;
  if (!pr) return;

  // 1. 自动选中对应案由
  if (pr._typeId) {
    ysState.selectedType = pr._typeId;
  } else {
    ysState.selectedType = 'minjie'; // 默认民间借贷
  }
  renderYaosushi();

  // 2. 等DOM渲染完成后填入字段
  setTimeout(function() {
    var pfx = ysGetFormPrefix(ysState.selectedType);
    var filledCount = 0;

    // 判断是否使用多人表单
    var multiPartyTypes = ['minjie','maimai','fangmaijie','fangzu','jinjie','laodong','lihun','jianshe','jidong','buzh','caisun'];
    var useMultiParty = multiPartyTypes.indexOf(ysState.selectedType) >= 0;
    // 原告/被告字段前缀：多人表单带索引0，单人表单不带
    var pIdBase = useMultiParty ? pfx + '_p0' : pfx + '_p';
    var dIdBase = useMultiParty ? pfx + '_d0' : pfx + '_d';

    // 辅助：设置radio选中并触发切换
    function setRadioAndToggle(name, value, toggleFn) {
      var radios = document.getElementsByName(name);
      for (var i = 0; i < radios.length; i++) {
        if (radios[i].value === value) {
          radios[i].checked = true;
          if (toggleFn) toggleFn();
          break;
        }
      }
    }

    // 填原告（根据识别到的当事人类型）
    if (pr.p_orgType === '法人') {
      // 法人当事人
      ysSetField(pIdBase + '_org_name', pr.p_name);
      ysSetField(pIdBase + '_org_addr', pr.p_addr);
      ysSetField(pIdBase + '_org_phone', pr.p_phone);
      // 切换到法人显示
      if (useMultiParty) {
        setRadioAndToggle(pIdBase + '_type', '法人', function() { ysTogglePartyType(pIdBase, '法人'); });
      } else {
        ysTogglePartyType(pfx + '_p', '法人');
      }
    } else {
      // 自然人当事人
      if (pr.p_name) { ysSetField(pIdBase + '_name', pr.p_name); filledCount++; }
      if (pr.p_gender) ysSetSelect(pIdBase + '_gender', pr.p_gender);
      if (pr.p_phone) { ysSetField(pIdBase + '_phone', pr.p_phone); filledCount++; }
      if (pr.p_idno) ysSetField(pIdBase + '_idno', pr.p_idno);
      if (pr.p_addr) { ysSetField(pIdBase + '_addr', pr.p_addr); filledCount++; }
      if (pr.p_birth) ysSetField(pIdBase + '_birth', pr.p_birth);
      if (pr.p_ethnic) ysSetField(pIdBase + '_ethnic', pr.p_ethnic);
      if (pr.p_workunit) ysSetField(pIdBase + '_workunit', pr.p_workunit);
    }
    if (pr.p_agent) {
      ysSetField(pIdBase + '_agent', pr.p_agent);
      if (useMultiParty) {
        setRadioAndToggle(pIdBase + '_agent_has', '有', function() { ysToggleAgent(pIdBase, true); });
      }
      filledCount++;
    }

    // 填被告
    if (pr.d_orgType === '法人') {
      ysSetField(dIdBase + '_org_name', pr.d_name);
      ysSetField(dIdBase + '_org_addr', pr.d_addr);
      ysSetField(dIdBase + '_org_phone', pr.d_phone);
      if (useMultiParty) {
        setRadioAndToggle(dIdBase + '_type', '法人', function() { ysTogglePartyType(dIdBase, '法人'); });
      } else {
        ysTogglePartyType(pfx + '_d', '法人');
      }
    } else {
      if (pr.d_name) { ysSetField(dIdBase + '_name', pr.d_name); filledCount++; }
      if (pr.d_gender) ysSetSelect(dIdBase + '_gender', pr.d_gender);
      if (pr.d_phone) { ysSetField(dIdBase + '_phone', pr.d_phone); filledCount++; }
      if (pr.d_idno) ysSetField(dIdBase + '_idno', pr.d_idno);
      if (pr.d_addr) { ysSetField(dIdBase + '_addr', pr.d_addr); filledCount++; }
    }

    // 填借贷相关字段（仅民间借贷）
    if (ysState.selectedType === 'minjie') {
      if (pr.amount) {
        ysSetField('mj_principal', pr.amount);
        ysSetField('mj_amount', pr.amount);
        ysSetField('mj_actual', pr.amount);
        filledCount++;
      }
      if (pr.rate) { ysSetField('mj_rate', pr.rate); filledCount++; }
      if (pr.period) { ysSetField('mj_period', pr.period); filledCount++; }
      if (pr.payway) ysSetSelect('mj_payway', pr.payway);
      if (pr.ct_date) ysSetField('mj_ctname', '借款合同，' + pr.ct_date);
    }

    // 填诉讼请求
    if (pr.claims) {
      var claimsId = (ysState.selectedType === 'jidong') ? 'jd_claim_text' : (pfx + '_other');
      var claimsEl = document.getElementById(claimsId);
      if (!claimsEl) claimsEl = document.getElementById('mj_other');
      if (claimsEl && !claimsEl.value) claimsEl.value = '【诉讼请求原文】\n' + pr.claims;
      filledCount++;
    }

    // 填事实与理由
    if (pr.facts) {
      var factsEl = document.getElementById(pfx + '_facts');
      if (!factsEl) factsEl = document.getElementById('mj_facts');
      if (factsEl && !factsEl.value) factsEl.value = '【事实与理由原文】\n' + pr.facts;
      filledCount++;
    }

    // 滚动到表单
    var formEl = document.getElementById('ysFormArea');
    if (formEl) formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    toast('✅ 已自动填入 ' + pr._identified + ' 项要素（' + filledCount + ' 项已填入表单），请核对后生成文书', 'success');
  }, 300);
}

// 工具：获取表单前缀
function ysGetFormPrefix(typeId) {
  var map = {
    'minjie': 'mj', 'maimai': 'mm', 'fangmaijie': 'fmj', 'fangzu': 'fz',
    'jinjie': 'jj', 'laodong': 'ld', 'lihun': 'lh', 'jianshe': 'js',
    'jidong': 'jd', 'buzh': 'bz', 'caisun': 'cs', 'baozheng': 'bzh',
    'zhixing': 'zx', 'yijian': 'yj', 'fuyi': 'fy', 'canyufenpei': 'cyfp'
  };
  return map[typeId] || 'mj';
}

// 工具：设置输入框
function ysSetField(id, value) {
  var el = document.getElementById(id);
  if (el && !el.value) el.value = value;
}

// 工具：设置下拉框
function ysSetSelect(id, value) {
  var el = document.getElementById(id);
  if (!el) return;
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === value || el.options[i].text === value) {
      el.selectedIndex = i; return;
    }
  }
}
