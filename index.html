// ============ 智能解析传统诉状 ============

// 切换输入标签（粘贴/上传）
function ysSetParseTab(tab) {
  ysState.parseTab = tab;
  ysState.parseResult = null;
  renderYaosushi();
}

// 处理文件上传
function ysHandleFileUpload(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result || '';
    ysState.parseTab = 'text'; // 切回文本模式显示内容
    renderYaosushi();
    setTimeout(function() {
      var ta = document.getElementById('ysParseInput');
      if (ta) { ta.value = text; }
    }, 50);
    toast('文件读取成功，点击「立即识别」开始解析', 'success');
  };
  reader.readAsText(file, 'UTF-8');
}

// 启动解析
function ysStartParse() {
  var ta = document.getElementById('ysParseInput');
  var text = ta ? ta.value.trim() : '';
  if (!text) { toast('请先输入或粘贴诉状内容', 'warning'); return; }
  var result = ysParseText(text);
  ysState.parseResult = result;
  if (result._identified === 0) {
    toast('未能识别到有效内容，请确认文本格式是否为起诉状', 'warning');
  } else {
    toast('成功识别 ' + result._identified + ' 项要素！', 'success');
  }
  renderYaosushi();
  // 滚动到识别结果
  setTimeout(function() {
    var el = document.querySelector('.ys-parse-result');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ===== 核心解析函数 =====
function ysParseText(text) {
  var r = { _identified: 0, _typeId: null, _typeLabel: null };

  // ===== 1. 识别案由 =====
  var typeInfo = ysDetectCause(text);
  r._typeId = typeInfo.id;
  r._typeLabel = typeInfo.label;
  if (typeInfo.id) r._identified++;

  // ===== 2. 提取原告信息 =====
  // 匹配 "原告：姓名，性别，..." 或 "原告姓名：..." 段落
  var ptf = ysExtractParty(text, ['原告', '申请人', '上诉人', '出借方', '出借人', '卖方', '买方']);
  if (ptf.name) { r.p_name = ptf.name; r._identified++; }
  if (ptf.gender) r.p_gender = ptf.gender;
  if (ptf.phone) { r.p_phone = ptf.phone; r._identified++; }
  if (ptf.idno) r.p_idno = ptf.idno;
  if (ptf.addr) { r.p_addr = ptf.addr; r._identified++; }

  // ===== 3. 提取被告信息 =====
  var def = ysExtractParty(text, ['被告', '被申请人', '被上诉人', '借款方', '借款人', '买方', '出卖方']);
  if (def.name) { r.d_name = def.name; r._identified++; }
  if (def.gender) r.d_gender = def.gender;
  if (def.phone) { r.d_phone = def.phone; r._identified++; }
  if (def.idno) r.d_idno = def.idno;
  if (def.addr) { r.d_addr = def.addr; r._identified++; }

  // ===== 4. 提取借款金额 =====
  var amountMatch = text.match(/借款[金额本金]*[为是：:\s]*[人民币￥¥]?\s*([0-9,，]+(?:\.[0-9]+)?)\s*元/);
  if (!amountMatch) amountMatch = text.match(/[金额本金][为是：:\s]*[人民币￥¥]?\s*([0-9,，]+(?:\.[0-9]+)?)\s*元/);
  if (!amountMatch) amountMatch = text.match(/([0-9,，]+(?:\.[0-9]+)?)\s*元[整正]?\s*(?:人民币|RMB)?.*?(?:借|款|贷)/);
  if (amountMatch) {
    r.amount = amountMatch[1].replace(/,|，/g, '');
    r._identified++;
  }

  // ===== 5. 提取利率 =====
  var rateMatch = text.match(/(?:年利率|利率)[为是：:\s]*([0-9]+(?:\.[0-9]+)?)\s*%/);
  if (!rateMatch) rateMatch = text.match(/([0-9]+(?:\.[0-9]+)?)\s*%\s*(?:的)?(?:年利率|月利率|利率)/);
  if (rateMatch) { r.rate = rateMatch[1]; r._identified++; }

  // ===== 6. 提取借款期限 =====
  var periodMatch = text.match(/(?:借款期限|还款期限|借款期间|还款日期)[为是：:\s]*([\d零一二三四五六七八九十百]+年[\d零一二三四五六七八九十]+月[\d零一二三四五六七八九十]+日[至到—\-][\d零一二三四五六七八九十百]+年[\d零一二三四五六七八九十]+月[\d零一二三四五六七八九十]+日)/);
  if (!periodMatch) periodMatch = text.match(/自?(2\d{3}年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日)[至到—\-](2\d{3}年[0-9一二三四五六七八九十]+月[0-9一二三四五六七八九十]+日)/);
  if (periodMatch) {
    r.period = periodMatch[1] + (periodMatch[2] ? '至' + periodMatch[2] : '');
    r._identified++;
  }

  // ===== 7. 提取出借方式 =====
  if (/转账|汇款|银行/.test(text)) r.payway = '转账';
  else if (/现金/.test(text)) r.payway = '现金';

  // ===== 8. 提取诉讼请求 =====
  var claimsMatch = text.match(/(?:诉讼请求|请求事项|诉请)[：:\s\n]+([\s\S]{20,600}?)(?=事实与理由|事实理由|法律依据|此致|附|一、[^、])/);
  if (claimsMatch) {
    r.claims = claimsMatch[1].trim().slice(0, 300);
    r._identified++;
  }

  // ===== 9. 提取代理律师 =====
  var agentMatch = text.match(/委托(?:诉讼)?代理人[：:\s]*([^\s，,。\n]{2,15})/);
  if (agentMatch) r.p_agent = agentMatch[1];

  return r;
}

// 识别案由
function ysDetectCause(text) {
  var causeMap = [
    { id: 'minjie', label: '民间借贷纠纷', keywords: ['民间借贷', '借款合同', '借款纠纷', '民间借贷纠纷', '借款本金', '出借', '借款人', '出借方'] },
    { id: 'maimai', label: '买卖合同纠纷', keywords: ['买卖合同', '购销合同', '货款', '买卖', '产品质量', '售价', '卖方', '买方'] },
    { id: 'fangmaijie', label: '房屋买卖合同纠纷', keywords: ['房屋买卖', '商品房', '购房', '房屋转让', '不动产', '房产'] },
    { id: 'fangzu', label: '房屋租赁合同纠纷', keywords: ['房屋租赁', '租房', '租金', '承租', '房租', '租赁合同'] },
    { id: 'jinjie', label: '金融借款合同纠纷', keywords: ['金融借款', '银行贷款', '信用贷款', '商业贷款', '按揭贷款'] },
    { id: 'laodong', label: '劳动合同纠纷', keywords: ['劳动合同', '工资', '劳动报酬', '解除劳动', '劳动争议', '用人单位'] },
    { id: 'lihun', label: '离婚纠纷', keywords: ['离婚', '夫妻', '婚姻', '子女抚养', '共同财产', '分割'] },
    { id: 'jianshe', label: '建设工程合同纠纷', keywords: ['建设工程', '施工合同', '工程款', '承包', '发包', '建筑工程'] },
    { id: 'jidong', label: '机动车交通事故责任纠纷', keywords: ['交通事故', '车辆', '机动车', '驾驶', '撞车', '交强险'] },
    { id: 'caisun', label: '财产损害赔偿纠纷', keywords: ['财产损害', '赔偿', '损失', '侵权'] },
    { id: 'lihun', label: '离婚纠纷', keywords: ['离婚'] }
  ];
  var scores = {};
  causeMap.forEach(function(c) {
    scores[c.id] = 0;
    c.keywords.forEach(function(kw) { if (text.indexOf(kw) >= 0) scores[c.id] += 1; });
  });
  var best = null; var bestScore = 0;
  causeMap.forEach(function(c) {
    if (scores[c.id] > bestScore) { bestScore = scores[c.id]; best = c; }
  });
  return best && bestScore > 0 ? { id: best.id, label: best.label } : { id: null, label: null };
}

// 提取当事人信息（通用）
function ysExtractParty(text, labels) {
  var info = {};
  // 找到第一个匹配标签的段落
  var labelReg = new RegExp('(?:' + labels.join('|') + ')\\s*[：:、]\\s*([^\\n]{2,60})');
  var m = text.match(labelReg);
  if (!m) return info;
  var line = m[1];

  // 提取姓名（第一个词语，在逗号/，前）
  var nameM = line.match(/^([^\s，,男女0-9]{2,10})/);
  if (nameM) info.name = nameM[1].replace(/[，,。\s]$/, '');

  // 性别
  if (/男/.test(line.slice(0,20))) info.gender = '男';
  else if (/女/.test(line.slice(0,20))) info.gender = '女';

  // 电话（11位手机号）
  var phoneM = text.slice(Math.max(0, text.indexOf(m[0]) - 20), text.indexOf(m[0]) + 200).match(/1[3-9]\d{9}/);
  if (phoneM) info.phone = phoneM[0];

  // 身份证号
  var idM = line.match(/([1-9]\d{5}(?:18|19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dX])/i);
  if (!idM) {
    var context = text.slice(text.indexOf(m[0]), text.indexOf(m[0]) + 200);
    idM = context.match(/([1-9]\d{5}(?:18|19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dX])/i);
  }
  if (idM) info.idno = idM[1];

  // 地址（现住/住所地/住址）
  var addrM = text.slice(text.indexOf(m[0]), text.indexOf(m[0]) + 300).match(/(?:现住|住所地|住址|住所|通讯地址)[：:\s]*([^\n，,。]{6,60})/);
  if (!addrM) addrM = line.match(/(?:住|居住于|地址)[：:\s]*([^\n，,。]{5,50})/);
  if (!addrM) {
    // 从整个行里取地址性内容（省/市/区/路/号/村）
    var addrCandM = line.match(/([^\s，,]{2,5}(?:省|市|区|县|镇|街|路|号|村|组)[^\s，,。]{2,40})/);
    if (addrCandM) addrM = addrCandM;
  }
  if (addrM) info.addr = (addrM[1] || addrM[0]).trim();

  return info;
}

// ===== 一键填入表单 =====
function ysFillFormFromParse() {
  var pr = ysState.parseResult;
  if (!pr) return;

  // 1. 自动选中对应案由
  if (pr._typeId) {
    ysState.selectedType = pr._typeId;
  } else {
    ysState.selectedType = 'minjie'; // 默认民间借贷
  }
  renderYaosushi();

  // 2. 等DOM渲染完成后填入字段
  setTimeout(function() {
    var pfx = ysGetFormPrefix(ysState.selectedType);

    // 填原告
    if (pr.p_name) ysSetField(pfx + '_p_name', pr.p_name);
    if (pr.p_gender) ysSetSelect(pfx + '_p_gender', pr.p_gender);
    if (pr.p_phone) ysSetField(pfx + '_p_phone', pr.p_phone);
    if (pr.p_idno) ysSetField(pfx + '_p_idno', pr.p_idno);
    if (pr.p_addr) ysSetField(pfx + '_p_addr', pr.p_addr);
    if (pr.p_agent) ysSetField(pfx + '_p_agent', pr.p_agent);

    // 填被告
    if (pr.d_name) ysSetField(pfx + '_d_name', pr.d_name);
    if (pr.d_gender) ysSetSelect(pfx + '_d_gender', pr.d_gender);
    if (pr.d_phone) ysSetField(pfx + '_d_phone', pr.d_phone);
    if (pr.d_idno) ysSetField(pfx + '_d_idno', pr.d_idno);
    if (pr.d_addr) ysSetField(pfx + '_d_addr', pr.d_addr);

    // 填借贷相关字段（仅民间借贷）
    if (ysState.selectedType === 'minjie') {
      if (pr.amount) {
        ysSetField('mj_principal', pr.amount);
        ysSetField('mj_amount', pr.amount);
        ysSetField('mj_actual', pr.amount);
      }
      if (pr.rate) ysSetField('mj_rate', pr.rate);
      if (pr.period) ysSetField('mj_period', pr.period);
      if (pr.payway) ysSetSelect('mj_payway', pr.payway);
    }

    // 填诉讼请求到other备注
    if (pr.claims) {
      var otherEl = document.getElementById(pfx + '_other');
      if (!otherEl) otherEl = document.getElementById('mj_other');
      if (otherEl && !otherEl.value) otherEl.value = '【诉讼请求原文】\n' + pr.claims;
    }

    // 滚动到表单
    var formEl = document.getElementById('ysFormArea');
    if (formEl) formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    toast('✅ 已自动填入 ' + pr._identified + ' 项要素，请核对后生成文书', 'success');
  }, 200);
}

// 工具：获取表单前缀
function ysGetFormPrefix(typeId) {
  var map = {
    'minjie': 'mj', 'maimai': 'mm', 'fangmaijie': 'fmj', 'fangzu': 'fz',
    'jinjie': 'jj', 'laodong': 'ld', 'lihun': 'lh', 'jianshe': 'js',
    'jidong': 'jd', 'buzh': 'bz', 'caisun': 'cs', 'baozheng': 'bzh',
    'zhixing': 'zx', 'yijian': 'yj', 'fuyi': 'fy', 'canyufenpei': 'cyfp'
  };
  return map[typeId] || 'mj';
}

// 工具：设置输入框
function ysSetField(id, value) {
  var el = document.getElementById(id);
  if (el && !el.value) el.value = value;
}

// 工具：设置下拉框
function ysSetSelect(id, value) {
  var el = document.getElementById(id);
  if (!el) return;
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === value || el.options[i].text === value) {
      el.selectedIndex = i; return;
    }
  }
}

// ============ PAGE ROUTER (update to include new pages) ============
var _origNavigateTo = typeof navigateTo === 'function' ? navigateTo : null;

function navigateTo(page) {
  var titles = {
    dashboard: '仪表盘', schedule: '日程管理', todos: '待办事项',
    cases: '案件管理', summary: '工作总结', reminders: '提醒中心',
    tools: '工具箱', yaosushi: '要素式诉状生成器'
  };
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('pageTitle').textContent = titles[page] || page;
  if (page === 'yaosushi') {
    renderYaosushi();
  } else if (page === 'dashboard') {
    renderDashboard();
  } else if (page === 'schedule') {
    renderSchedule();
  } else if (page === 'todos') {
    renderTodos();
  } else if (page === 'cases') {
    renderCases();
  } else if (page === 'summary') {
    renderSummary();
  } else if (page === 'reminders') {
    renderReminders();
  } else if (page === 'tools') {
    renderTools();
  }
}
